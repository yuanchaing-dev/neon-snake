services:
  - type: web
    name: neon-snake
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: neon-snake-db
          property: connectionString

databases:
  - name: neon-snake-db
    databaseName: neon_snake
    user: snake_user
    plan: free
