
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;} /* FIXED: 讓頁面本身吃滿電腦螢幕，避免外層留白或捲軸 */
#aw{position:relative;width:100vw;height:100vh;border-radius:0;overflow:hidden;font-family:'Courier New',monospace;background:#000;} /* FIXED: 遊戲容器改為佔滿整個瀏覽器視窗 */
#ac{display:block;width:100%;height:100%;}
#hud{position:absolute;top:10px;left:14px;right:14px;display:flex;justify-content:space-between;align-items:center;pointer-events:none;opacity:0;}
.hs{color:#fff;font-size:12px;font-weight:700;letter-spacing:1px;text-shadow:0 0 6px #000;}
#bbar{display:flex;gap:3px;align-items:center;}
#p1HpHud,#p2HpHud{position:absolute;top:34px;display:none;align-items:center;gap:3px;color:#fff;font-size:12px;font-weight:700;letter-spacing:1px;text-shadow:0 0 6px #000;pointer-events:none;} /* FIXED: 組隊模式 P1/P2 血量固定顯示在上方左右 */
#p1HpHud{left:14px;} /* FIXED: 組隊模式 P1 血量在左上 */
#p2HpHud{right:14px;} /* FIXED: 組隊模式 P2 血量在右上 */
.hpLabel{margin-right:4px;}
.bhp{width:13px;height:13px;border-radius:2px;}
#cf{position:absolute;top:46px;left:50%;transform:translateX(-50%);font-size:15px;font-weight:700;letter-spacing:2px;color:#ff0;opacity:0;pointer-events:none;transition:opacity 0.3s;white-space:nowrap;}
#rf{position:absolute;inset:0;border-radius:12px;pointer-events:none;border:0px solid red;opacity:0;transition:border-width 0.1s,opacity 0.2s;}
#coinEl{position:absolute;top:10px;left:50%;transform:translateX(-50%);color:#ffd700;font-size:13px;font-weight:700;letter-spacing:1px;pointer-events:none;opacity:0;text-shadow:0 0 8px #000;}
#namePrompt{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.62);z-index:5;}
#nameBox{width:min(320px,calc(100% - 40px));padding:20px;border-radius:12px;background:rgba(4,6,20,0.96);border:1px solid rgba(255,200,50,0.45);box-shadow:0 0 24px rgba(0,0,0,0.5);text-align:center;}
#nameBox h3{color:#ffe066;font-size:18px;margin-bottom:8px;letter-spacing:1px;}
#nameBox p{color:#888;font-size:11px;margin-bottom:14px;}
#playerNameInput{width:100%;height:38px;border-radius:8px;border:1px solid rgba(255,255,255,0.25);background:#050711;color:#fff;text-align:center;font-size:16px;font-weight:700;outline:none;font-family:'Courier New',monospace;}
#playerNameBtn{width:100%;height:38px;margin-top:12px;border:0;border-radius:8px;background:#ffe066;color:#111;font-weight:900;font-family:'Courier New',monospace;cursor:pointer;}
#googleLoginPanel{position:absolute;top:14px;right:16px;z-index:6;min-width:150px;min-height:34px;} /* FIXED: 標題畫面右上 Google 登入區，承載真正 Google Identity Services 按鈕 */
#googleButtonHost{display:none;} /* FIXED: Google Client ID 設定完成後，renderButton 會在這裡產生真正可登入的 Google 按鈕 */
#googleLoginBtn{height:34px;padding:0 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.24);background:rgba(255,255,255,0.92);color:#222;font:900 12px 'Courier New',monospace;cursor:pointer;box-shadow:0 0 12px rgba(0,0,0,0.35);} /* FIXED: 未設定 Client ID 或登入後狀態顯示用按鍵 */
#googleLoginBtn.signed{background:rgba(100,255,170,0.92);border-color:rgba(100,255,170,0.7);} /* FIXED: 已登入時顯示不同狀態 */

#mobileControls{position:absolute;inset:0;display:none;pointer-events:none;z-index:4;} /* FIXED: 手機版虛擬移動鍵容器，避免影響電腦操作 */
.mobile-stick{position:absolute;bottom:24px;width:112px;height:112px;border-radius:50%;background:rgba(80,130,255,0.18);border:2px solid rgba(120,180,255,0.45);box-shadow:0 0 18px rgba(0,0,0,0.45);pointer-events:auto;touch-action:none;user-select:none;} /* FIXED: 手機移動鍵外圈 */
.mobile-stick::after{content:attr(data-label);position:absolute;left:0;right:0;bottom:-20px;text-align:center;color:rgba(255,255,255,0.72);font:700 11px 'Courier New',monospace;text-shadow:0 0 5px #000;} /* FIXED: 顯示 P1 / P2 標籤 */
.mobile-knob{position:absolute;left:50%;top:50%;width:48px;height:48px;border-radius:50%;transform:translate(-50%,-50%);background:rgba(120,200,255,0.42);border:2px solid rgba(210,240,255,0.75);box-shadow:inset 0 0 10px rgba(255,255,255,0.25),0 0 14px rgba(0,0,0,0.35);} /* FIXED: 手機移動鍵搖桿 */
#stickLeft{left:24px;} /* FIXED: 手機移動鍵改到左下；單人控制 P1，雙人控制 P1 */
#mobileBombBtn{position:absolute;right:18px;bottom:18px;width:64px;height:64px;border-radius:50%;border:2px solid rgba(255,180,80,0.8);background:rgba(255,80,20,0.32);color:#ffe066;font:900 12px 'Courier New',monospace;text-align:center;line-height:60px;box-shadow:0 0 18px rgba(0,0,0,0.55),inset 0 0 14px rgba(255,220,120,0.2);pointer-events:auto;touch-action:none;user-select:none;} /* FIXED: 手機版炸彈鍵固定在右下角 */
#mobileBombBtn:active,#mobileBombBtn.pressed{background:rgba(255,120,30,0.58);transform:scale(0.94);} /* FIXED: 手機炸彈鍵按下回饋 */
#stickRight{right:24px;bottom:96px;} /* FIXED: 雙人模式 P2 右側移動鍵上移，避免與右下炸彈鍵重疊 */
@media (pointer:coarse),(max-width:768px){
  #mobileControls.playing{display:block;} /* FIXED: 手機版只在遊戲中顯示移動鍵 */
  #mobileControls.single #stickLeft{display:block;} /* FIXED: 單人模式移動鍵改到左下 */
  #mobileControls.coop #stickLeft{display:block;} /* FIXED: 雙人模式維持左、右各一個移動鍵 */
}

</style>

</div>

<div id="p1HpHud"></div> <!-- FIXED: 組隊模式 P1 血量顯示在左上 -->
<div id="p2HpHud"></div> <!-- FIXED: 組隊模式 P2 血量顯示在右上 -->

<div id="rf"></div>

  <div id="stickLeft" class="mobile-stick" data-label="P1">
    <div class="mobile-knob"></div>
  </div>
  <div id="stickRight" class="mobile-stick" data-label="MOVE">
    <div class="mobile-knob"></div>
  </div>

</div>

  <div id="nameBox">
    <h3>輸入玩家名字</h3>
    <p id="nameModeText">名稱會顯示在排行榜上</p>
    <input id="playerNameInput" maxlength="12" placeholder="PLAYER" autocomplete="off">
    <button id="playerNameBtn">開始遊戲</button>
  </div>
</div>
</div>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
(function(){
const aw=document.getElementById('aw');
const ac=document.getElementById('ac');
const ctx=ac.getContext('2d');
const scEl=document.getElementById('sc');
const lelEl=document.getElementById('lel');
const bbar=document.getElementById('bbar');
const hud=document.getElementById('hud');
const cfEl=document.getElementById('cf');
const rfEl=document.getElementById('rf');
const coinEl=document.getElementById('coinEl');
const p1HpHud=document.getElementById('p1HpHud'); // FIXED: 組隊模式 P1 血量 UI
const p2HpHud=document.getElementById('p2HpHud'); // FIXED: 組隊模式 P2 血量 UI
const namePrompt=document.getElementById('namePrompt'); // FIXED: 新增進入遊戲前的玩家名稱輸入視窗
const playerNameInput=document.getElementById('playerNameInput'); // FIXED: 玩家名稱輸入欄位
const playerNameBtn=document.getElementById('playerNameBtn'); // FIXED: 玩家名稱確認按鈕
const nameModeText=document.getElementById('nameModeText'); // FIXED: 名稱視窗顯示目前模式
const mobileControls=document.getElementById('mobileControls'); // FIXED: 手機虛擬移動鍵容器
const stickLeft=document.getElementById('stickLeft'); // FIXED: 雙人 P1 左側移動鍵
const stickRight=document.getElementById('stickRight'); // FIXED: 單人/P2 右側移動鍵
const mobileBombBtn=document.getElementById('mobileBombBtn'); // FIXED: 手機版右下炸彈鍵
const googleLoginPanel=document.getElementById('googleLoginPanel'); // FIXED: 控制整個 Google 登入區顯示/隱藏
const googleLoginBtn=document.getElementById('googleLoginBtn'); // FIXED: 標題畫面右上 Google 登入按鍵
const googleButtonHost=document.getElementById('googleButtonHost'); // FIXED: 真正 Google Identity Services 按鈕掛載點

let W,H;
function resize(){W=window.innerWidth;H=window.innerHeight;aw.style.width=W+'px';aw.style.height=H+'px';ac.width=W;ac.height=H;} // FIXED: Canvas 高度改跟隨視窗高度，不再固定 540px
resize();
window.addEventListener('resize',resize); // FIXED: 視窗縮放時同步重算全螢幕 Canvas

// ── PERSISTENT STATE ──
let coins=0;
let ownedPlanes=[0]; // plane ids owned
let selectedPlane=0;
let ownedSkins=['classic']; // FIXED: 已購買飛機皮膚
let selectedSkin='classic'; // FIXED: 目前套用的飛機皮膚
let leaderboard=[];
let currentPlayerName='PLAYER'; // FIXED: 保存本局玩家名稱，供排行榜寫入
let gameMode='single'; // FIXED: single / coop，本機雙人組隊模式
let googleProfile=null; // FIXED: 保存 Google 登入後的玩家資料，用來同步排行榜名稱
const GOOGLE_CLIENT_ID=''; // FIXED: 填入 Google Cloud 建立的 Web OAuth Client ID，例如 xxxxx.apps.googleusercontent.com
const GOOGLE_CLIENT_ID_STORAGE_KEY='airforce1945.googleClientId'; // FIXED: 允許第一次點擊時輸入並保存 Client ID，避免每次修改 HTML
const PLAYER_STORAGE_KEY='airforce1945.playerState'; // FIXED: 未登入也保存玩家名稱與金錢
const PLAYER_STORAGE_PREFIX='airforce1945.googlePlayer.'; // FIXED: Google 登入後用 localStorage 保留玩家名稱與金錢
const LAST_GOOGLE_PROFILE_KEY='airforce1945.lastGoogleProfile'; // FIXED: 保留上次登入的 Google 基本資料，重新開啟仍可帶回名稱與金錢
const LEADERBOARD_STORAGE_KEY='airforce1945.leaderboard'; // FIXED: 排行榜保存 key，重新開啟遊戲仍保留名次、名字、分數

// ── PLANE DEFINITIONS ──
const PLANES=[
  {id:0,name:'EAGLE',price:0,color:'#88ccff',accent:'#5599cc',desc:'標準機　均衡型',shot:'normal',spd:220,hp:5,bombs:2,special:''},
  {id:1,name:'STORM',price:80,color:'#ff9944',accent:'#cc5500',desc:'高速機　快速衝鋒',shot:'normal',spd:320,hp:4,bombs:1,special:'速度+50%'},
  // FIXED: 重型機與散彈機的商店位置、價格、攻擊方式、血量、速度、炸彈數完整互換
  {id:4,name:'TITAN',price:120,color:'#ff4466',accent:'#aa0022',desc:'重型機　高耐久',shot:'normal',spd:160,hp:8,bombs:3,special:'HP+3 炸彈+1'}, // FIXED: 重型機數值改回高耐久普通攻擊
  {id:3,name:'LASER',price:180,color:'#00ffcc',accent:'#008877',desc:'雷射機　超強火力',shot:'laser',spd:180,hp:3,bombs:1,special:'常時雷射'},
  {id:2,name:'THUNDER',price:250,color:'#aa44ff',accent:'#7700cc',desc:'散彈機　範圍攻擊',shot:'spread',spd:190,hp:4,bombs:2,special:'常時散彈'}, // FIXED: 散彈機數值改回散射攻擊
];
function getPlaneById(id){ // FIXED: PLANES 陣列順序與飛機 id 不一定相同，實戰必須用 id 查找，避免重型機/散彈機數值互相套錯
  return PLANES.find(p=>p.id===Number(id))||PLANES[0];
}

// ── SKIN DEFINITIONS ──
const SKINS=[ // FIXED: 皮膚店資料，僅影響外觀，不改飛機性能
  {id:'classic',name:'原廠塗裝',price:0,color:null,accent:null,desc:'保留各飛機原色'},
  {id:'gold',name:'黃金塗裝',price:120,color:'#ffd700',accent:'#b8860b',desc:'金色機身'},
  {id:'neon',name:'霓虹藍紫',price:180,color:'#66e6ff',accent:'#aa44ff',desc:'高亮霓虹'},
  {id:'stealth',name:'黑曜隱形',price:220,color:'#2f3542',accent:'#0f172a',desc:'深色戰機'},
  {id:'ruby',name:'赤焰紅翼',price:260,color:'#ff3b3b',accent:'#8b0000',desc:'火焰紅色'},
  {id:'snow',name:'雪白銀翼',price:300,color:'#f5f7ff',accent:'#9aa4b2',desc:'白銀機身'},
];
function getSkinById(id){ // FIXED: 依皮膚 id 取資料，避免保存值失效造成錯誤
  return SKINS.find(s=>s.id===id)||SKINS[0];
}
function getPlaneVisual(pl,skinId){ // FIXED: 統一取得飛機實際顯示顏色；classic 保留原飛機色
  const skin=getSkinById(skinId||selectedSkin);
  return {color:skin.color||pl.color,accent:skin.accent||pl.accent};
}

// ── PHASE & GAME ──
let phase='title'; // title | nameinput | shop | skinshop | playing | gameover | win
let gs=null;
let running=false;
let lastT=0;
let titleTick=0;
let shopSelected=0;

const keys={};
window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault();
  if(e.code==='Space'&&phase==='title')startGame('single'); // FIXED: 空白鍵預設單人模式
  if(e.code==='Escape'&&phase==='shop'){phase='title';}
  if(e.code==='Escape'&&phase==='skinshop'){phase='title';} // FIXED: 皮膚店可按 ESC 返回標題
  if(e.code==='Escape'&&phase==='nameinput')hideNamePrompt(); // FIXED: 可取消名稱輸入並回標題
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});

let touchDir={x:0,y:0},touchSX=null,touchSY=null;
ac.addEventListener('touchstart',e=>{
  touchSX=e.touches[0].clientX;touchSY=e.touches[0].clientY;
},{passive:true});
ac.addEventListener('touchmove',e=>{
  if(!touchSX)return;
  touchDir.x=(e.touches[0].clientX-touchSX)/50;
  touchDir.y=(e.touches[0].clientY-touchSY)/50;
  touchDir.x=Math.max(-1,Math.min(1,touchDir.x));
  touchDir.y=Math.max(-1,Math.min(1,touchDir.y));
},{passive:true});
ac.addEventListener('touchend',()=>{touchDir={x:0,y:0};touchSX=null;},{passive:true});

let mobileLeftDir={x:0,y:0},mobileRightDir={x:0,y:0}; // FIXED: 手機版左右虛擬搖桿方向
function setupMobileStick(stick,dirRef){
  const knob=stick.querySelector('.mobile-knob');
  let active=false,pointerId=null;
  function setDir(clientX,clientY){
    const r=stick.getBoundingClientRect();
    const cx=r.left+r.width/2,cy=r.top+r.height/2;
    const max=r.width*0.34;
    let dx=clientX-cx,dy=clientY-cy;
    const len=Math.hypot(dx,dy);
    if(len>max){dx=dx/len*max;dy=dy/len*max;}
    dirRef.x=dx/max;dirRef.y=dy/max;
    knob.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  }
  function resetDir(){
    dirRef.x=0;dirRef.y=0;
    knob.style.transform='translate(-50%,-50%)';
  }
  stick.addEventListener('pointerdown',e=>{active=true;pointerId=e.pointerId;stick.setPointerCapture(pointerId);setDir(e.clientX,e.clientY);e.preventDefault();});
  stick.addEventListener('pointermove',e=>{if(!active||e.pointerId!==pointerId)return;setDir(e.clientX,e.clientY);e.preventDefault();});
  stick.addEventListener('pointerup',e=>{if(e.pointerId!==pointerId)return;active=false;pointerId=null;resetDir();e.preventDefault();});
  stick.addEventListener('pointercancel',()=>{active=false;pointerId=null;resetDir();});
}
setupMobileStick(stickLeft,mobileLeftDir); // FIXED: 左側移動鍵控制 P1（雙人）
setupMobileStick(stickRight,mobileRightDir); // FIXED: 右側移動鍵控制單人/P2
function setupMobileBombButton(){
  function press(e){keys._mobileBombPressed=true;mobileBombBtn.classList.add('pressed');e.preventDefault();} // FIXED: 手機炸彈鍵按下時觸發炸彈輸入
  function release(e){keys._mobileBombPressed=false;mobileBombBtn.classList.remove('pressed');if(e)e.preventDefault();} // FIXED: 放開後解除，避免連續誤觸
  mobileBombBtn.addEventListener('pointerdown',press);
  mobileBombBtn.addEventListener('pointerup',release);
  mobileBombBtn.addEventListener('pointercancel',release);
  mobileBombBtn.addEventListener('pointerleave',release);
}
setupMobileBombButton(); // FIXED: 綁定手機版右下炸彈鍵
function syncMobileControls(){
  if(!mobileControls)return;
  mobileControls.classList.toggle('playing',phase==='playing');
  mobileControls.classList.toggle('single',gameMode!=='coop');
  mobileControls.classList.toggle('coop',gameMode==='coop');
  stickRight.setAttribute('data-label',gameMode==='coop'?'P2':'MOVE');
}


ac.addEventListener('click',e=>{
  const rect=ac.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(H/rect.height);
  handleUIClick(mx,my);
});

// ── UI CLICK ZONES (stored each frame) ──
let uiZones=[];
function addZone(x,y,w,h,action){uiZones.push({x,y,w,h,action});}
function handleUIClick(mx,my){
  for(const z of uiZones){
    if(mx>=z.x&&mx<=z.x+z.w&&my>=z.y&&my<=z.y+z.h){z.action();return;}
  }
}

function setGoogleLoginVisible(visible){ // FIXED: 標題以外畫面要同時隱藏真正 Google 按鈕與 fallback 按鍵
  if(googleLoginPanel)googleLoginPanel.style.display=visible?'block':'none';
}
function getGoogleClientId(){ // FIXED: 支援程式常數、網址參數、本機保存三種方式取得 Client ID
  try{
    const q=new URLSearchParams(window.location.search).get('googleClientId');
    if(q&&q.includes('.apps.googleusercontent.com')){localStorage.setItem(GOOGLE_CLIENT_ID_STORAGE_KEY,q.trim());return q.trim();}
  }catch(err){}
  if(GOOGLE_CLIENT_ID&&GOOGLE_CLIENT_ID.includes('.apps.googleusercontent.com'))return GOOGLE_CLIENT_ID.trim();
  try{
    const saved=localStorage.getItem(GOOGLE_CLIENT_ID_STORAGE_KEY);
    if(saved&&saved.includes('.apps.googleusercontent.com'))return saved.trim();
  }catch(err){}
  return '';
}
function askAndSaveGoogleClientId(){ // FIXED: 沒有 Client ID 時，讓使用者直接貼上可用憑證
  const input=prompt('請貼上 Google OAuth Web Client ID（格式：xxxxx.apps.googleusercontent.com）。\n注意：Google Cloud 的 Authorized JavaScript origins 必須包含目前網址，例如 http://localhost:5500');
  const id=(input||'').trim();
  if(!id)return '';
  if(!id.includes('.apps.googleusercontent.com')){alert('Client ID 格式不正確，必須以 .apps.googleusercontent.com 結尾。');return '';}
  try{localStorage.setItem(GOOGLE_CLIENT_ID_STORAGE_KEY,id);}catch(err){}
  return id;
}
function sanitizePlayerName(name){
  const n=(name||'').trim().replace(/\s+/g,' ').slice(0,12); // FIXED: 限制排行榜名稱長度，避免畫面溢位
  return n||'PLAYER';
}
function getGooglePlayerStorageKey(profile){ // FIXED: 依 Google 帳號建立獨立存檔 key
  const id=(profile&&(profile.sub||profile.email||profile.name))||'guest';
  return PLAYER_STORAGE_PREFIX+encodeURIComponent(id);
}
function normalizePlaneState(data){ // FIXED: 保存/讀回商店飛機擁有狀態與目前選用飛機
  const validIds=PLANES.map(p=>p.id);
  const owned=Array.isArray(data&&data.ownedPlanes)?data.ownedPlanes.map(Number).filter(id=>validIds.includes(id)):[];
  if(!owned.includes(0))owned.unshift(0);
  ownedPlanes=[...new Set(owned)];
  const selected=Number(data&&data.selectedPlane);
  selectedPlane=ownedPlanes.includes(selected)?selected:0;
}
function normalizeSkinState(data){ // FIXED: 保存/讀回已購買皮膚與目前套用皮膚
  const validIds=SKINS.map(s=>s.id);
  const owned=Array.isArray(data&&data.ownedSkins)?data.ownedSkins.filter(id=>validIds.includes(id)):[];
  if(!owned.includes('classic'))owned.unshift('classic');
  ownedSkins=[...new Set(owned)];
  const selected=(data&&data.selectedSkin)||'classic';
  selectedSkin=ownedSkins.includes(selected)?selected:'classic';
}
function buildPlayerSaveData(){ // FIXED: 統一保存玩家名稱、金錢、已購買飛機、選用飛機、已購買皮膚與目前皮膚
  return {name:currentPlayerName,coins,ownedPlanes:[...new Set(ownedPlanes)],selectedPlane,ownedSkins:[...new Set(ownedSkins)],selectedSkin};
}

function decodeGoogleJwt(token){
  try{
    const payload=token.split('.')[1];
    const json=decodeURIComponent(atob(payload.replace(/-/g,'+').replace(/_/g,'/')).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    return JSON.parse(json);
  }catch(err){return null;}
}
function handleGoogleCredentialResponse(res){ // FIXED: 真正 Google 登入成功後，從 GIS 回傳的 ID token 取得玩家資料
  if(!res||!res.credential){alert('Google 登入失敗：沒有收到 credential。');return;}
  const profile=decodeGoogleJwt(res.credential);
  const clientId=getGoogleClientId();
  if(!profile){alert('Google 登入失敗：無法解析 Google ID token。');return;}
  if(clientId&&profile.aud&&profile.aud!==clientId){alert('Google 登入失敗：ID token aud 與目前 Client ID 不一致。');return;} // FIXED: 基本檢查避免錯用其他專案 token
  applyGoogleProfile(profile);
}
function applyGoogleProfile(profile){
  if(!profile)return;
  googleProfile=profile;
  currentPlayerName=sanitizePlayerName(profile.name||profile.email||'PLAYER'); // FIXED: Google 名稱同步到本局玩家名稱與排行榜
  loadGooglePlayerState(profile); // FIXED: 登入後讀回該帳號保存的名稱與金錢
  googleLoginBtn.textContent='Google：'+currentPlayerName;
  googleLoginBtn.classList.add('signed');
  googleLoginBtn.style.display='inline-block'; // FIXED: 登入後顯示目前帳號名稱
  if(googleButtonHost)googleButtonHost.style.display='none'; // FIXED: 已登入後隱藏 Google 原生登入鈕，避免畫面重疊
  savePlayerState(); // FIXED: 首次登入也立即建立存檔，之後可保留名字與金錢
}
let googleLoginInitialized=false; // FIXED: Google Identity Services 規範建議 initialize 只做一次
function renderRealGoogleButton(){ // FIXED: 使用 Google Identity Services 的 renderButton，產生真正可登入按鈕
  const clientId=getGoogleClientId();
  if(!clientId||!window.google||!google.accounts||!google.accounts.id||!googleButtonHost)return false;
  if(!googleLoginInitialized){
    google.accounts.id.initialize({client_id:clientId,callback:handleGoogleCredentialResponse,auto_select:false});
    googleLoginInitialized=true;
  }
  googleButtonHost.innerHTML='';
  google.accounts.id.renderButton(googleButtonHost,{theme:'outline',size:'medium',type:'standard',text:'signin_with',shape:'rectangular',width:160});
  googleButtonHost.style.display='block';
  googleLoginBtn.style.display=googleProfile?'inline-block':'none';
  return true;
}

}

function fireBossAttack(s,b,mode){ // FIXED: 集中處理 20 關 Boss 攻擊模式，避免改動主流程
  const target=(s.mode==='coop'&&s.p2hp>0&&(s.hp<=0||Math.hypot(s.p2x-b.x,s.p2y-b.y)<Math.hypot(s.px-b.x,s.py-b.y)))?{x:s.p2x,y:s.p2y}:{x:s.px,y:s.py}; const dx=target.x-b.x,dy=target.y-b.y,len=Math.sqrt(dx*dx+dy*dy)||1; // FIXED: Boss 會瞄準較近的存活玩家
  const aim=Math.atan2(dy,dx);

  else if(mode==='fan')[-30,-15,0,15,30].forEach(ang=>{const a=aim+ang*Math.PI/180;s.ebullets.push({x:b.x,y:b.y+30,vx:Math.cos(a)*240,vy:Math.sin(a)*240,type:'boss',dmg:2});});
  else if(mode==='circle')for(let i=0;i<10;i++){const a=(i/10)*Math.PI*2;s.ebullets.push({x:b.x,y:b.y,vx:Math.cos(a)*200,vy:Math.sin(a)*200,type:'boss',dmg:2});}
  else if(mode==='side')[-1,1].forEach(side=>s.ebullets.push({x:b.x+side*50,y:b.y+30,vx:side*60,vy:250,type:'boss',dmg:2}));
  else if(mode==='fastAim')s.ebullets.push({x:b.x,y:b.y+30,vx:dx/len*340,vy:dy/len*340,type:'boss',dmg:2});
  else if(mode==='cross')[[1,0],[-1,0],[0,1],[0,-1]].forEach(([vx,vy])=>s.ebullets.push({x:b.x,y:b.y,vx:vx*250,vy:vy*250,type:'boss',dmg:2}));
  else if(mode==='spiral'){b.angle+=0.45;[-0.8,0,0.8].forEach(offset=>{const a=b.angle+offset;s.ebullets.push({x:b.x,y:b.y,vx:Math.cos(a)*230,vy:Math.sin(a)*230,type:'boss',dmg:2});});}
  else if(mode==='dense')for(let i=0;i<16;i++){const a=(i/16)*Math.PI*2+(b.angle||0);s.ebullets.push({x:b.x,y:b.y,vx:Math.cos(a)*280,vy:Math.sin(a)*280,type:'boss',dmg:2});} 
  else if(mode==='chaos')for(let i=0;i<12;i++){const a=Math.random()*Math.PI*2;s.ebullets.push({x:b.x,y:b.y,vx:Math.cos(a)*(180+Math.random()*160),vy:Math.sin(a)*(180+Math.random()*160),type:'boss',dmg:2});}
  else if(mode==='final')for(let i=0;i<24;i++){const a=(i/24)*Math.PI*2+(b.angle||0);s.ebullets.push({x:b.x,y:b.y,vx:Math.cos(a)*320,vy:Math.sin(a)*320,type:'boss',dmg:3});}
}

function updateMagnetCoins(s,dt){ // FIXED: 只有擊殺掉落金幣會自動吸到存活玩家身上，其他道具維持碰撞拾取
  s.magnetCoins=s.magnetCoins.filter(c=>{
    c.age+=dt;
    const target=(s.mode==='coop'&&s.p2hp>0&&(s.hp<=0||Math.hypot(s.p2x-c.x,s.p2y-c.y)<Math.hypot(s.px-c.x,s.py-c.y)))?{x:s.p2x,y:s.p2y}:{x:s.px,y:s.py};
    const dx=target.x-c.x,dy=target.y-c.y;
    const dist=Math.sqrt(dx*dx+dy*dy)||1;
    const pull=c.age<0.18?0:Math.min(620,220+c.age*520);
    if(c.age<0.18)c.y+=c.vy*dt;
    else {c.x+=(dx/dist)*pull*dt;c.y+=(dy/dist)*pull*dt;}
    if(dist<18){
      s.coinsEarned+=c.value;coins+=c.value;savePlayerState();coinEl.textContent='💰 '+coins;flashMsg('+'+c.value+' 💰','#ffd700');
      return false;
    }
    return c.y<H+40&&c.x>-40&&c.x<W+40;
  });
}

  if(s.invince>0)s.invince-=dt;if(s.shield>0)s.shield-=dt;if(s.p2invince>0)s.p2invince-=dt;if(s.p2shield>0)s.p2shield-=dt; // FIXED

  s.bullets=s.bullets.filter(b=>{b.x+=b.vx*dt;b.y+=b.vy*dt;return b.y>-20&&b.y<H+20&&b.x>-20&&b.x<W+20;});

  if(!s.bossSpawn&&!s.boss){

    if(s.killCount>=s.levelKillTarget){s.bossSpawn=true;spawnBoss(s);s.enemies=[];flashMsg('BOSS INCOMING!','#ff2244');}

    if(e.shootTimer<=0){e.shootTimer=e.shootRate;const target=(s.mode==='coop'&&s.p2hp>0&&(s.hp<=0||Math.hypot(s.p2x-e.x,s.p2y-e.y)<Math.hypot(s.px-e.x,s.py-e.y)))?{x:s.p2x,y:s.p2y}:{x:s.px,y:s.py}; const dx=target.x-e.x,dy=target.y-e.y,len=Math.sqrt(dx*dx+dy*dy)||1; // FIXED: 組隊模式敵人瞄準較近玩家

  s.powerups=s.powerups.filter(p=>{p.y+=p.vy*dt;
    const p1Hit=s.hp>0&&Math.abs(p.x-s.px)<20&&Math.abs(p.y-s.py)<20;
    const p2Hit=s.mode==='coop'&&s.p2hp>0&&Math.abs(p.x-s.p2x)<20&&Math.abs(p.y-s.p2y)<20; // FIXED
    if(p1Hit||p2Hit){
      if(p.type==='hp'){if(p2Hit)s.p2hp=Math.min(s.p2maxhp,s.p2hp+1);else s.hp=Math.min(s.maxhp,s.hp+1);flashMsg('+1 HP','#ff88aa');}
      else if(p.type==='bomb'){if(p2Hit)s.p2bombs++;else s.bombs++;flashMsg('BOMB +1','#ff8800');}
      else if(p.type==='shield'){if(p2Hit)s.p2shield=8;else s.shield=8;flashMsg('SHIELD ON','#00ff88');}
      else if(p.type==='revive'){ // FIXED: 組隊模式復活倒下隊友
        if(s.mode==='coop'&&s.hp<=0&&s.p2hp>0){s.hp=Math.max(1,Math.ceil(s.maxhp/2));s.invince=2;flashMsg('P1 REVIVED!','#66ffaa');}
        else if(s.mode==='coop'&&s.p2hp<=0&&s.hp>0){s.p2hp=Math.max(1,Math.ceil(s.p2maxhp/2));s.p2invince=2;s.p2alive=true;flashMsg('P2 REVIVED!','#66ffaa');}
        else {flashMsg('REVIVE READY','#66ffaa');}
      }
      else if(p.type==='coin'){const c=5; // FIXED: 金幣道具拾取一次加 5
        s.coinsEarned+=c;coins+=c;savePlayerState();coinEl.textContent='💰 '+coins;flashMsg('+'+c+' 💰','#ffd700');} // FIXED: 拾取金幣道具後保存
      return false;
    }return p.y<H+20;});
  s.explosions=s.explosions.filter(e=>{e.frame+=dt*60;return e.frame<e.maxFrame;});
  s.bombEffects=s.bombEffects.filter(b=>{b.timer-=dt;return b.timer>0;});
  scEl.textContent='SCORE: '+Math.floor(s.score);lelEl.textContent='STAGE '+s.level;
  bbar.innerHTML='';for(let i=0;i<s.maxhp;i++){const d=document.createElement('div');d.className='bhp';d.style.background=i<s.hp?getPlaneById(s.planeId).color:'#333';bbar.appendChild(d);}
  syncHpHud(s); // FIXED: 組隊模式 P1 血量左上、P2 血量右上
}

function drawGame(){
  const s=gs;const pl=getPlaneById(s.planeId); // FIXED: 用飛機 id 取資料，不用陣列 index
  ctx.fillStyle='#04040f';ctx.fillRect(0,0,W,H);
  drawStars(1);drawClouds(0.8);
  if(s.bombEffects.length){ctx.fillStyle=`rgba(255,200,100,${s.bombEffects[0].timer*1.3})`;ctx.fillRect(0,0,W,H);}
  s.magnetCoins.forEach(c=>drawMagnetCoin(c)); // FIXED: 顯示擊殺後自動吸附的金幣
  s.powerups.forEach(p=>drawPowerup(p.x,p.y,p.type));
  s.enemies.forEach(e=>drawEnemyPlane(e.x,e.y,e.type));
  if(s.boss)drawBoss(s.boss.x,s.boss.y,s.boss.hp,s.boss.maxhp,s.tick);
  s.bullets.forEach(b=>drawBullet(b.x,b.y,b.type));
  s.ebullets.forEach(b=>drawBullet(b.x,b.y,b.type));
  s.explosions.forEach(e=>drawExplosion(e.x,e.y,e.frame/e.maxFrame,e.big));
  const inv=s.invince>0&&Math.floor(s.invince*10)%2===0;
  if(!inv&&s.hp>0){
    if(s.shield>0){ctx.save();ctx.strokeStyle='rgba(0,255,136,0.7)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(s.px,s.py,28,0,Math.PI*2);ctx.stroke();ctx.restore();}
    if(s.shotType==='laser'){ctx.strokeStyle='rgba(0,255,200,0.1)';ctx.lineWidth=10;ctx.beginPath();ctx.moveTo(s.px,s.py-20);ctx.lineTo(s.px,0);ctx.stroke();}
    const gpV=getPlaneVisual(pl); // FIXED: 實戰玩家飛機套用目前皮膚
    drawPlane(s.px,s.py,1.1,gpV.color,gpV.accent,pl.shot,s.tick);
  }
  const p2inv=s.p2invince>0&&Math.floor(s.p2invince*10)%2===0; // FIXED
  if(s.mode==='coop'&&!p2inv&&s.p2hp>0){
    if(s.p2shield>0){ctx.save();ctx.strokeStyle='rgba(102,255,170,0.7)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(s.p2x,s.p2y,28,0,Math.PI*2);ctx.stroke();ctx.restore();}
    drawPlane(s.p2x,s.p2y,1.1,'#66ffaa','#22aa66',pl.shot,s.tick); // FIXED: P2 使用綠色識別
  }
  ctx.fillStyle='rgba(255,200,0,0.25)';
  for(let i=0;i<s.bombs;i++){ctx.beginPath();ctx.arc(14+i*18,H-14,6,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle='#aaa';ctx.font='bold 9px Courier New';ctx.textAlign='left';ctx.textBaseline='alphabetic';ctx.fillText('P1 BOMB',4,H-4);
  if(s.mode==='coop'){ctx.fillStyle='rgba(102,255,170,0.25)';for(let i=0;i<s.p2bombs;i++){ctx.beginPath();ctx.arc(14+i*18,H-34,6,0,Math.PI*2);ctx.fill();}ctx.fillStyle='#aaa';ctx.fillText('P2 BOMB',4,H-24);} // FIXED
  ctx.fillStyle=pl.color;ctx.font='bold 12px Courier New';ctx.textAlign='right';ctx.textBaseline='alphabetic';
  if(s.mode!=='coop')ctx.fillText('HP: '+s.hp+' / '+s.maxhp,W-12,H-10); // FIXED: 組隊血量改由左上 P1、右上 P2 顯示，避免底部重複
}

function loop(t){
  if(!running)return;
  const dt=Math.min((t-lastT)/1000,0.05);lastT=t;
  uiZones=[];
  syncMobileControls(); // FIXED: 每幀同步手機移動鍵顯示狀態
  if(phase==='title'){drawTitle();requestAnimationFrame(loop);return;}
  if(phase==='nameinput'){drawTitle();requestAnimationFrame(loop);return;} // FIXED: 名稱輸入時保留標題背景，不進入遊戲更新
  if(phase==='shop'){drawShop();requestAnimationFrame(loop);return;}
  if(phase==='skinshop'){drawSkinShop();requestAnimationFrame(loop);return;} // FIXED: 皮膚店畫面
  if(phase==='gameover'||phase==='win'){drawResultScreen();requestAnimationFrame(loop);return;}
  updateGame(dt);drawGame();
  if(gs.gameOver){addScore(gs.score,gs.level,gs.killCount);phase='gameover';titleTick=0;}
  else if(gs.won){addScore(gs.score,gs.level,gs.killCount);phase='win';titleTick=0;}
  requestAnimationFrame(loop);
}

function beginGame(){
  setGoogleLoginVisible(false); // FIXED: 遊戲中隱藏 Google 登入區
  gs=initGs();phase='playing'; // FIXED: 真正開始遊戲的內部函式，避免略過名稱輸入
  hud.style.opacity='1';coinEl.style.opacity='1';
  syncHpHud(gs); // FIXED: 開局立即刷新組隊血量位置
  syncMobileControls(); // FIXED: 開始遊戲後顯示對應手機移動鍵
  cfEl.style.opacity='0';
}
function startGame(mode){
  showNamePrompt(mode||'single'); // FIXED: 每次進入遊戲前先選擇模式並要求輸入名字
}

running=true;
requestAnimationFrame(t=>{lastT=t;loop(t);});
})();
</script>
