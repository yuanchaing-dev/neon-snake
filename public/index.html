<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HTML5 遊戲中心</title>
  <style>
    :root{
      --bg:#0f172a;
      --panel:#111827;
      --card:#182235;
      --card2:#101827;
      --text:#f8fafc;
      --muted:#94a3b8;
      --line:rgba(148,163,184,.22);
      --accent:#38bdf8;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#1e293b 0,#0f172a 42%,#020617 100%);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;}
    .wrap{width:min(1440px,calc(100% - 40px));margin:0 auto;padding:36px 0 56px;}
    header{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;margin-bottom:24px;}
    h1{font-size:clamp(28px,4vw,44px);margin:0 0 8px;font-weight:900;letter-spacing:.02em;}
    .subtitle{margin:0;color:var(--muted);font-size:15px;line-height:1.7;}
    .badge{border:1px solid var(--line);background:rgba(15,23,42,.72);border-radius:999px;padding:10px 14px;color:#cbd5e1;font-size:13px;white-space:nowrap;}
    .grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:18px;}
    .card{display:block;text-decoration:none;color:inherit;background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 16px 42px rgba(0,0,0,.26);transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease;}
    .card:hover{transform:translateY(-4px);border-color:rgba(56,189,248,.75);box-shadow:0 20px 54px rgba(8,47,73,.45);}
    .thumb{position:relative;aspect-ratio:16/9;background:#020617;overflow:hidden;}
    .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
    .content{padding:14px 14px 16px;}
    .title{margin:0 0 8px;font-size:16px;font-weight:850;line-height:1.35;}
    .desc{margin:0;color:var(--muted);font-size:13px;line-height:1.5;min-height:39px;}
    .meta{display:flex;justify-content:space-between;align-items:center;margin-top:14px;color:#bae6fd;font-size:12px;font-weight:700;}
    .open{color:var(--accent);}
    @media (max-width:1200px){.grid{grid-template-columns:repeat(4,minmax(0,1fr));}}
    @media (max-width:860px){.wrap{width:min(100% - 28px,720px);padding-top:24px}.grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}header{display:block}.badge{display:inline-block;margin-top:14px}.desc{min-height:auto}}
    @media (max-width:480px){.grid{grid-template-columns:1fr}.wrap{width:min(100% - 22px,420px)}}
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <div>
        <h1>HTML5 遊戲中心</h1>
        <p class="subtitle">每個遊戲放在獨立資料夾，入口頁只負責顯示列表；後續新增遊戲時，新增資料夾與一筆 games 設定即可。</p>
      </div>
      <div class="badge">一列 6 格｜Render Node.js 部署</div>
    </header>

    <section id="gameGrid" class="grid" aria-label="遊戲列表"></section>
  </main>

  <script>
    const games = [
      {
        title: '霓虹貪食蛇',
        folder: 'neon-snake',
        cover: '/assets/thumbnails/neon-snake.svg',
        description: '多關卡霓虹風格貪食蛇。',
        tag: 'Snake'
      },
      {
        title: 'Air Force 1945',
        folder: 'airforce-1945',
        cover: '/assets/thumbnails/airforce-1945.svg',
        description: '飛機射擊、排行榜、商店與皮膚系統。',
        tag: 'Shooter'
      }
    ];

    const grid = document.getElementById('gameGrid');
    grid.innerHTML = games.map(game => `
      <a class="card" href="/games/${game.folder}/" aria-label="進入 ${game.title}">
        <div class="thumb"><img src="${game.cover}" alt="${game.title} 遊戲截圖"></div>
        <div class="content">
          <h2 class="title">${game.title}</h2>
          <p class="desc">${game.description}</p>
          <div class="meta"><span>${game.tag}</span><span class="open">進入遊戲 →</span></div>
        </div>
      </a>
    `).join('');
  </script>
</body>
</html>
